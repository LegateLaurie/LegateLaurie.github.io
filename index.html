<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #24292f;
            background: #ffffff;
            margin: 0;
        }

        main {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 32px;
        }

        h1 {
            font-size: 2em;
            border-bottom: 1px solid #d0d7de;
            padding-bottom: .3em;
            margin-bottom: 24px;
        }

        p {
            font-size: 16px;
            margin: 16px 0;
        }

        img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
            margin: 16px 0;
        }

        footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid #d0d7de;
        }

        footer h2 {
            font-size: 1.3em;
            margin-bottom: 12px;
        }

        footer a {
            color: #0969da;
            text-decoration: none;
            margin-right: 20px;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<main>

<h1>Welcome to My Page</h1>

<p>Here's Trungus!</p>

<img src="Trungus.png" alt="Trungus">

<p>I hope he likes you.</p>

<footer>
    <h2>Find me at</h2>

    <a href="https://www.twitch.tv/legatelaurie" target="_blank">Twitch</a>
    <a href="https://www.youtube.com/@legatelaurie" target="_blank">YouTube</a>
	<a href="https://www.deviantart.com/legatelaurie" target="_blank">Deviantart</a>

</footer>

</main>

</body>
</html>
